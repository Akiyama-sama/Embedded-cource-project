<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}银行排队叫号系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">RK3562 Bank Queue</p>
          <h1>{% block heading %}银行营业大厅排队叫号系统{% endblock %}</h1>
        </div>
        <div class="status-pill" id="connection-state">连接中</div>
      </header>
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
